services:
  mariadb:
    image: mariadb:11.4
    container_name: mariadb
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u root -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adriansvevside
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      Frost__ClientId: ${FROST_CLIENT_ID}
      Frost__ClientSecret: ${FROST_CLIENT_SECRET}
      FootballData__ApiKey: ${FOOTBALLDATA_API_KEY}
      ConnectionStrings__DefaultConnection: "Server=mariadb;Port=3306;Database=${MARIADB_DATABASE};User=${MARIADB_USER};Password=${MARIADB_PASSWORD};TreatTinyAsBoolean=false"
    expose:
      - "8080"

  nginx:
    image: nginx:1.29-alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_conf:/etc/nginx/conf.d
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
      - nginx_cache:/var/cache/nginx

volumes:
  mariadb_data:
  nginx_conf:
  certbot_www:
  letsencrypt:
  nginx_cache:
