map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80;
    listen [::]:80;
    server_name vigdal.dev www.vigdal.dev;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri\; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vigdal.dev www.vigdal.dev;

    ssl_certificate /etc/letsencrypt/live/vigdal.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vigdal.dev/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:;" always;

    location / {
        proxy_pass         http://web:8080\;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        client_max_body_size 25m;
    }

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
}
